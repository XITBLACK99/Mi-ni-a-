<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Un regalo para Sofía</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { display: block; position: absolute; }
        
        /* --- ESTILO DEL SOBRE --- */
        #capa-sobre {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-out;
        }

        .sobre {
            position: relative;
            width: 250px;
            height: 150px;
            background: #d4a017; 
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sobre::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
            border-top: 100px solid #ffcc00; 
            transition: transform 0.6s;
            transform-origin: top;
            z-index: 2;
        }

        .sobre.abierto::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .texto-click {
            color: #fff;
            font-family: 'Dancing Script', cursive;
            margin-top: 20px;
            font-size: 1.5rem;
            text-align: center;
            animation: latido 1.5s infinite;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .contenedor-texto {
            position: absolute;
            top: 15%;
            text-align: center;
            z-index: 10;
            width: 90%;
            pointer-events: none;
        }

        #frase {
            color: #fff;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff9900;
        }
    </style>
</head>
<body>

    <audio id="musicaFondo" src="musica.mp3" preload="auto"></audio>

    <div id="capa-sobre" onclick="abrirRegalo()">
        <div class="sobre" id="sobreElemento"></div>
        <div class="texto-click">Sofía, tienes un mensaje...<br>Toca para abrir</div>
    </div>

    <div class="contenedor-texto">
        <div id="frase"></div>
    </div>
    
    <canvas id="canvasFlor"></canvas>

    <script>
        const canvas = document.getElementById('canvasFlor');
        const ctx = canvas.getContext('2d');
        const divFrase = document.getElementById('frase');
        const capaSobre = document.getElementById('capa-sobre');
        const sobreElemento = document.getElementById('sobreElemento');
        const musica = document.getElementById('musicaFondo');

        const textoParaEscribir = "Sofía, eres la razón por la que mi mundo siempre está en primavera";
        let yaEmpezoAEscribir = false;
        let mostrarCorazones = false;
        let florIniciada = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- FUNCIÓN AL ABRIR ---
        function abrirRegalo() {
            // Reproducir música
            musica.play().catch(error => console.log("Error al reproducir:", error));
            
            sobreElemento.classList.add('abierto');
            setTimeout(() => {
                capaSobre.style.opacity = '0';
                setTimeout(() => {
                    capaSobre.style.display = 'none';
                    florIniciada = true;
                }, 1000);
            }, 600);
        }

        let estrellas = [];
        let corazones = [];
        let progresoTallo = 0;
        let progresoPetalos = 0;
        let tiempo = 0;

        class Estrella {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.v = 1.5 + Math.random() * 2;
                this.size = Math.random() * 3;
            }
            update() {
                this.y += this.v;
                if (this.y > canvas.height) this.init();
            }
            draw() {
                ctx.fillStyle = "#ffcc00";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Corazon {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vY = -1 - Math.random() * 2;
                this.alpha = 1;
            }
            update() {
                this.y += this.vY;
                this.alpha -= 0.01;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = "#ff007f";
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x, this.y - 3, this.x - 5, this.y - 15, this.x - 15, this.y - 15);
                ctx.bezierCurveTo(this.x - 30, this.y - 15, this.x - 30, this.y + 12.5, this.x - 30, this.y + 12.5);
                ctx.bezierCurveTo(this.x - 30, this.y + 25, this.x - 15, this.y + 37, this.x, this.y + 45);
                ctx.bezierCurveTo(this.x + 15, this.y + 37, this.x + 30, this.y + 25, this.x + 30, this.y + 12.5);
                ctx.bezierCurveTo(this.x + 30, this.y + 12.5, this.x + 30, this.y - 15, this.x + 15, this.y - 15);
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i = 0; i < 70; i++) estrellas.push(new Estrella());

        function maquinaDeEscribir(texto, i = 0) {
            if (i < texto.length) {
                divFrase.innerHTML += texto.charAt(i);
                setTimeout(() => maquinaDeEscribir(texto, i + 1), 80);
            } else {
                mostrarCorazones = true;
            }
        }

        function dibujarFlor() {
            if(!florIniciada) return;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2 + 60;
            tiempo += 0.02;

            if (progresoTallo < 1) progresoTallo += 0.01;
            const altoTallo = 240 * progresoTallo;
            
            const gradTallo = ctx.createLinearGradient(cx - 10, cy, cx + 10, cy);
            gradTallo.addColorStop(0, '#0a3d1a');
            gradTallo.addColorStop(0.5, '#2ecc71');
            gradTallo.addColorStop(1, '#0a3d1a');

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx, cy + altoTallo);
            ctx.strokeStyle = gradTallo;
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.stroke();

            if (progresoTallo > 0.5) {
                dibujarHoja(cx + 8, cy + 100, 0.4);
                dibujarHoja(cx - 8, cy + 170, 2.7);
            }

            if (progresoTallo >= 1) {
                if (progresoPetalos < 1) progresoPetalos += 0.012;
                
                for (let i = 0; i < 12; i++) {
                    const ang = (i * Math.PI * 2) / 12;
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(ang + Math.sin(tiempo * 0.4) * 0.03);
                    ctx.scale(progresoPetalos, progresoPetalos);
                    ctx.beginPath();
                    ctx.ellipse(0, -65, 32, 72, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.fillStyle = "#ffcc00";
                    ctx.fill();
                    ctx.restore();
                }
                
                if (progresoPetalos >= 0.9 && !yaEmpezoAEscribir) {
                    yaEmpezoAEscribir = true;
                    maquinaDeEscribir(textoParaEscribir);
                }

                if (progresoPetalos >= 1) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, 38, 0, Math.PI * 2);
                    ctx.fillStyle = "#fff200";
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = "#ffcc00";
                    ctx.fill();
                }
            }
        }

        function dibujarHoja(x, y, ang) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(ang);
            ctx.beginPath();
            ctx.ellipse(20, 0, 28, 12, 0, 0, Math.PI * 2);
            ctx.fillStyle = "#2ecc71";
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.stroke();
            ctx.restore();
        }

        function animar() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            estrellas.forEach(e => { e.update(); e.draw(); });
            dibujarFlor();
            if (mostrarCorazones && Math.random() < 0.05) {
                corazones.push(new Corazon(Math.random() * canvas.width, canvas.height + 20));
            }
            corazones.forEach((c, index) => {
                c.update();
                c.draw();
                if (c.alpha <= 0) corazones.splice(index, 1);
            });
            requestAnimationFrame(animar);
        }

        animar();
    </script>
</body>
</html>
