<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Sofía ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; position: absolute; bottom: 0; }
        
        .contenedor-texto { 
            position: absolute; 
            top: 15%; 
            text-align: center; 
            z-index: 10; 
            width: 100%; 
            pointer-events: none; 
        }

        #frase { 
            color: #ffffff; 
            font-family: 'Great Vibes', cursive; 
            font-size: clamp(2.2rem, 9vw, 4.5rem); 
            text-shadow: 
                -3px -3px 0 #ff0077,  
                 3px -3px 0 #ff0077,
                -3px  3px 0 #ff0077,
                 3px  3px 0 #ff0077,
                 0px 0px 30px #ff0077;
            min-height: 4em; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            line-height: 1.1;
            padding: 0 20px;
        }

        #capa-sobre { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; transition: opacity 1s; }
        .sobre { width: 220px; height: 140px; background: #d4a017; position: relative; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sobre::before { content: ''; position: absolute; top: 0; left: 0; border-left: 110px solid transparent; border-right: 110px solid transparent; border-top: 90px solid #ffcc00; transition: transform 0.6s; transform-origin: top; z-index: 2; }
        .sobre.abierto::before { transform: rotateX(180deg); }
        .texto-click { color: #fff; font-family: 'Great Vibes', cursive; margin-top: 20px; font-size: 1.8rem; animation: latido 1.5s infinite; }
        @keyframes latido { 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <audio id="musicaFondo" src="musica.mp3" preload="auto" loop></audio>

    <div id="capa-sobre" onclick="abrirRegalo()">
        <div class="sobre" id="sobreElemento"></div>
        <div class="texto-click">Toca para Sofía ❤️</div>
    </div>

    <div class="contenedor-texto"><div id="frase"></div></div>
    <canvas id="canvasFlor"></canvas>

    <script>
        const canvas = document.getElementById('canvasFlor');
        const ctx = canvas.getContext('2d');
        const divFrase = document.getElementById('frase');
        const musica = document.getElementById('musicaFondo');
        let florIniciada = false;

        const frasesRomanticas = [
            "Para la niña más linda, Sofía ❤️", "Tú eres mi pensamiento favorito", "Mi lugar favorito es en tus brazos", 
            "Eres el regalo más bonito de mi vida", "Gracias por existir, mi Sofía", "Te amo hoy más que ayer",
            "Eres mi sol en días nublados", "Mi corazón late solo por ti", "Tú haces mi mundo mejor",
            "Eres mi sueño hecho realidad", "Contigo todo es más bonito", "Eres mi persona favorita",
            "Tu sonrisa es mi motor", "Cada segundo a tu lado es magia", "Te elijo hoy y siempre",
            "Eres el amor de mi vida", "Mi vida tiene sentido gracias a ti", "Eres mi paz y mi alegría",
            "Nunca soltaré tu mano", "Eres más de lo que siempre soñé", "Tu amor me hace fuerte",
            "Eres la razón de mis sonrisas", "Te amo hasta el infinito", "Contigo el tiempo vuela",
            "Eres mi pedacito de cielo", "No hay nadie como tú, Sofía", "Mi mayor tesoro eres tú",
            "Eres la luz de mis ojos", "Toda mi felicidad tiene tu nombre", "Eres mi hogar, Sofía",
            "Amo cada detalle de ti", "Eres la dueña de mi corazón", "No me canso de mirarte",
            "Eres mi principio y mi fin", "Mi amor por ti no tiene límites", "Contigo quiero todo",
            "Eres mi mejor aventura", "Me enamoras cada día más", "Gracias por amarme",
            "Eres mi media naranja", "Sofía, eres mi destino", "Te quiero con toda mi alma",
            "Eres perfección ante mis ojos", "Mi vida es hermosa si estás tú", "Eres mi gran amor",
            "Siempre estaré para ti", "Tu amor es mi medicina", "Eres la reina de mi mundo",
            "Prometo cuidarte siempre", "Eres y serás mi siempre Sofía ❤️"
        ];

        let indiceFrase = 0;

        // Función para el efecto de máquina de escribir
        function escribirFrase(texto) {
            let i = 0;
            divFrase.innerHTML = "";
            const interval = setInterval(() => {
                divFrase.innerHTML += texto.charAt(i);
                i++;
                if (i > texto.length) {
                    clearInterval(interval);
                    setTimeout(siguienteFrase, 3500); // Tiempo que se queda la frase escrita
                }
            }, 70); // Velocidad de escritura
        }

        function siguienteFrase() {
            indiceFrase = (indiceFrase + 1) % frasesRomanticas.length;
            escribirFrase(frasesRomanticas[indiceFrase]);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function abrirRegalo() {
            musica.play().catch(() => {});
            document.getElementById('sobreElemento').classList.add('abierto');
            setTimeout(() => {
                document.getElementById('capa-sobre').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('capa-sobre').style.display = 'none';
                    florIniciada = true;
                    escribirFrase(frasesRomanticas[0]); 
                }, 1000);
            }, 600);
        }

        class Particula {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 5 + 2;
                this.speed = Math.random() * 1.2 + 0.6;
                this.opacity = Math.random() * 0.7 + 0.3;
                this.tipo = Math.random() < 0.6 ? 'estrella' : 'corazon';
            }
            update() { this.y -= this.speed; if (this.y < -20) this.reset(); }
            draw() {
                ctx.save(); ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.tipo === 'estrella' ? '#ffffff' : '#ff99cc';
                if(this.tipo === 'estrella') {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2); ctx.fill();
                } else {
                    let s = this.size; ctx.beginPath(); ctx.moveTo(this.x, this.y);
                    ctx.bezierCurveTo(this.x-s, this.y-s, this.x-s, this.y+s, this.x, this.y+s*1.5);
                    ctx.bezierCurveTo(this.x+s, this.y+s, this.x+s, this.y-s, this.x, this.y); ctx.fill();
                }
                ctx.restore();
            }
        }

        const particulas = Array.from({length: 40}, () => new Particula());

        class Tulipan {
            constructor(targetX, targetY, delay, colorBase, colorPunta, angulo) {
                this.targetX = targetX; this.targetY = targetY;
                this.delay = delay; this.colorBase = colorBase; this.colorPunta = colorPunta;
                this.angulo = angulo; this.progreso = 0;
            }
            draw(cx, cy, t) {
                if (t < this.delay) return;
                if (this.progreso < 1) this.progreso += 0.01;
                const fx = cx + this.targetX * this.progreso;
                const fy = cy - this.targetY * this.progreso;
                ctx.beginPath(); ctx.moveTo(cx, cy + 100);
                ctx.quadraticCurveTo(cx + this.targetX * 0.2, cy, fx, fy);
                ctx.strokeStyle = '#0e2b1e'; ctx.lineWidth = 7; ctx.stroke();
                if (this.progreso >= 1) {
                    ctx.save(); ctx.translate(fx, fy);
                    ctx.rotate(this.angulo + Math.sin(t*0.04)*0.05);
                    for(let i=-1; i<=1; i++) {
                        ctx.save(); ctx.rotate(i * 0.25); ctx.beginPath(); ctx.moveTo(0,0);
                        ctx.bezierCurveTo(-22, -22, -14, -68, 0, -78);
                        ctx.bezierCurveTo(14, -68, 22, -22, 0, 0);
                        let g = ctx.createLinearGradient(0,0,0,-78);
                        g.addColorStop(0, this.colorBase); g.addColorStop(1, this.colorPunta);
                        ctx.fillStyle = g; ctx.fill(); ctx.restore();
                    }
                    ctx.restore();
                }
            }
        }

        const ramo = [
            [0, 320, 0, '#990000', '#ff3333', 0], [ -70, 290, 10, '#ff3366', '#ff9999', -0.1], [70, 290, 20, '#660066', '#cc33cc', 0.1],
            [-130, 250, 30, '#ff6633', '#ffcc99', -0.2], [130, 250, 40, '#ff99cc', '#ffccff', 0.2], [0, 240, 50, '#ffffff', '#fff5cc', 0],
            [-40, 260, 60, '#fff200', '#fff880', -0.05], [40, 260, 70, '#660066', '#cc33cc', 0.05], [-100, 220, 80, '#ffcc00', '#ffeb99', -0.15],
            [100, 220, 90, '#ff3366', '#ff9999', 0.15], [-160, 180, 100, '#990000', '#ff3333', -0.3], [160, 180, 110, '#660066', '#cc33cc', 0.3],
            [-20, 200, 120, '#660066', '#cc33cc', -0.02], [20, 200, 130, '#ff3366', '#ff9999', 0.02], [-80, 160, 140, '#ff6633', '#ffcc99', -0.1],
            [80, 160, 150, '#ff99cc', '#ffccff', 0.1], [0, 160, 160, '#fff200', '#fff880', 0], [-50, 140, 170, '#660066', '#cc33cc', -0.05],
            [50, 140, 180, '#ff3366', '#ff9999', 0.05], [-120, 120, 190, '#990000', '#ff3333', -0.2], [120, 120, 200, '#660066', '#cc33cc', 0.2],
            [0, 120, 210, '#ffffff', '#fff5cc', 0], [-90, 100, 220, '#fff200', '#fff880', -0.1], [90, 100, 230, '#ff3366', '#ff9999', 0.1],
            [0, 100, 240, '#ff6633', '#ffcc99', 0], [-60, 80, 250, '#660066', '#cc33cc', -0.05], [60, 80, 260, '#ff3366', '#ff9999', 0.05],
            [-140, 60, 270, '#990000', '#ff3333', -0.25], [140, 60, 280, '#ff99cc', '#ffccff', 0.25], [0, 60, 290, '#ffffff', '#fff5cc', 0]
        ].map(d => new Tulipan(...d));

        let f = 0;
        function render() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width,canvas.height);
            particulas.forEach(p => { p.update(); p.draw(); });
            if(florIniciada) {
                f++; const cx = canvas.width/2, cy = canvas.height-80;
                if(f > 80) {
                    ctx.fillStyle = '#b380ff'; ctx.beginPath();
                    ctx.moveTo(cx-150, cy); ctx.quadraticCurveTo(cx, cy+110, cx+150, cy);
                    ctx.lineTo(cx+80, cy+250); ctx.lineTo(cx-80, cy+250); ctx.fill();
                }
                ramo.forEach(t => t.draw(cx, cy, f));
            }
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
